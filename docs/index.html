<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BTC 模拟交易仪表盘</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
    .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .header h1 { font-size: 17px; font-weight: 600; }
    .header h1 span { color: #f0b429; }
    .price-badge { background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 5px 14px; font-size: 18px; font-weight: 700; color: #58a6ff; }
    .refresh-note { color: #8b949e; font-size: 12px; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3fb950; animation: pulse 2s infinite; margin-right: 5px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    /* 对比区 */
    .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media(max-width: 700px) { .compare-grid { grid-template-columns: 1fr; } }

    .strategy-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
    .strategy-header { padding: 14px 18px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; }
    .strategy-header h2 { font-size: 14px; font-weight: 600; }
    .strategy-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .badge-ai   { background: rgba(88,166,255,0.15); color: #58a6ff; }
    .badge-math { background: rgba(240,180,41,0.15); color: #f0b429; }
    .strategy-body { padding: 18px; }
    .big-num { font-size: 32px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 12px; color: #8b949e; }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .mini-item label { display: block; color: #8b949e; font-size: 11px; margin-bottom: 3px; }
    .mini-item span { font-size: 15px; font-weight: 600; }

    .up { color: #3fb950; } .down { color: #f85149; } .neutral { color: #e6edf3; }

    /* 详情区 */
    .section { background: #161b22; border: 1px solid #30363d; border-radius: 12px; margin-bottom: 18px; overflow: hidden; }
    .section-title { padding: 12px 18px; border-bottom: 1px solid #30363d; font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
    .empty { padding: 28px; text-align: center; color: #8b949e; font-size: 13px; }

    /* 持仓 */
    .pos-wrap { padding: 18px; }
    .pos-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .pos-side { padding: 3px 12px; border-radius: 20px; font-weight: 700; font-size: 12px; letter-spacing: 1px; }
    .side-long  { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid #3fb950; }
    .side-short { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid #f85149; }
    .pos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
    .pos-grid label { display: block; color: #8b949e; font-size: 11px; margin-bottom: 3px; }
    .pos-grid span { font-size: 14px; font-weight: 600; }
    .pnl-bar { margin-top: 14px; height: 3px; background: #21262d; border-radius: 2px; overflow: hidden; }
    .pnl-fill { height: 100%; border-radius: 2px; }

    /* 表格 */
    table { width: 100%; border-collapse: collapse; }
    th { padding: 9px 14px; text-align: left; color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid #21262d; }
    td { padding: 9px 14px; border-bottom: 1px solid #21262d; font-size: 12px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .b-buy   { background: rgba(63,185,80,0.15);   color: #3fb950; }
    .b-sell  { background: rgba(248,81,73,0.15);   color: #f85149; }
    .b-close { background: rgba(240,180,41,0.15);  color: #f0b429; }
    .b-hold  { background: rgba(139,148,158,0.15); color: #8b949e; }
    .conf-bar { display: inline-block; width: 50px; height: 5px; background: #21262d; border-radius: 3px; vertical-align: middle; margin-left: 5px; overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 3px; background: #58a6ff; }

    /* 币种图标颜色 */
    .coin-BTC { color: #f7931a; } .coin-ETH { color: #627eea; }
    .coin-BNB { color: #f3ba2f; } .coin-SOL { color: #9945ff; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 模拟合约 <span>策略对比</span> 仪表盘</h1>
    <div class="price-badge" id="btc-price">--</div>
    <div class="refresh-note"><span class="dot"></span>每30秒刷新</div>
  </div>

  <div class="container">
    <!-- 策略对比 -->
    <div class="compare-grid">
      <div class="strategy-card">
        <div class="strategy-header">
          <span>🧠</span>
          <h2>AI 策略</h2>
          <span class="strategy-badge badge-ai">Claude 驱动</span>
        </div>
        <div class="strategy-body">
          <div class="big-num" id="ai-equity">--</div>
          <div class="sub" id="ai-sub">初始 $10,000</div>
          <div class="mini-grid">
            <div class="mini-item"><label>收益率</label><span id="ai-return">--</span></div>
            <div class="mini-item"><label>累计盈亏</label><span id="ai-pnl">--</span></div>
            <div class="mini-item"><label>交易笔数</label><span id="ai-trades">--</span></div>
            <div class="mini-item"><label>胜率</label><span id="ai-winrate">--</span></div>
          </div>
        </div>
      </div>
      <div class="strategy-card">
        <div class="strategy-header">
          <span>🔄</span>
          <h2>轮换策略</h2>
          <span class="strategy-badge badge-math">纯数学，无AI</span>
        </div>
        <div class="strategy-body">
          <div class="big-num" id="rot-equity">--</div>
          <div class="sub" id="rot-sub">初始 $10,000</div>
          <div class="mini-grid">
            <div class="mini-item"><label>收益率</label><span id="rot-return">--</span></div>
            <div class="mini-item"><label>当前持有</label><span id="rot-coin">--</span></div>
            <div class="mini-item"><label>换币次数</label><span id="rot-trades">--</span></div>
            <div class="mini-item"><label>可选币种</label><span style="color:#8b949e;font-size:13px">BTC ETH BNB SOL</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- AI策略详情 -->
    <div class="section">
      <div class="section-title">🧠 AI策略 — 当前持仓</div>
      <div id="ai-positions"><div class="empty">当前空仓</div></div>
    </div>
    <div class="section">
      <div class="section-title">🧠 AI策略 — 历史交易</div>
      <div id="ai-history"><div class="empty">暂无记录</div></div>
    </div>
    <div class="section">
      <div class="section-title">🧠 AI策略 — Claude 今日决策</div>
      <div id="ai-decisions"><div class="empty">暂无记录</div></div>
    </div>

    <!-- 轮换策略详情 -->
    <div class="section">
      <div class="section-title">🔄 轮换策略 — 换币历史</div>
      <div id="rot-history"><div class="empty">暂无换币记录</div></div>
    </div>
  </div>

  <script>
    // ====== 填写你的 GitHub 信息 ======
    const GITHUB_USER = 'Kyo-G';
    const GITHUB_REPO = 'crypto-trading-bot';
    // ===================================

    const BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;

    const fmt     = n => '$' + Math.abs(+n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    const fmtS    = n => (+n >= 0 ? '+$' : '-$') + Math.abs(+n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    const fmtP    = n => (+n >= 0 ? '+' : '') + (+n).toFixed(2) + '%';
    const cc      = n => +n > 0 ? 'up' : +n < 0 ? 'down' : 'neutral';
    const ts      = iso => iso ? new Date(iso).toLocaleString('zh-CN',{timeZone:'Asia/Shanghai',hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';

    async function get(url) {
      try { const r = await fetch(url + '?t=' + Date.now()); return r.ok ? r.json() : null; } catch { return null; }
    }

    async function refresh() {
      const today = new Date().toISOString().split('T')[0];
      const [account, rotAccount, decisions, btcTicker] = await Promise.all([
        get(`${BASE}/data/paper-account.json`),
        get(`${BASE}/data/rotation-account.json`),
        get(`${BASE}/logs/decisions-${today}.json`),
        get('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT'),
      ]);

      const btcPrice = btcTicker ? parseFloat(btcTicker.price) : null;
      if (btcPrice) document.getElementById('btc-price').textContent = fmt(btcPrice);

      // ── AI策略 ──
      if (account) {
        const positions = (account.positions||[]).map(p => {
          const price = btcPrice || p.entryPrice;
          const pnl = p.side==='long' ? (price-p.entryPrice)*p.contracts : (p.entryPrice-price)*p.contracts;
          return {...p, unrealizedPnl: pnl, percentage: pnl/p.margin*100};
        });
        const unreal  = positions.reduce((s,p)=>s+p.unrealizedPnl, 0);
        const equity  = account.balance.USDT + account.balance.used + unreal;
        const ret     = (equity - account.initialBalance) / account.initialBalance * 100;
        const history = (account.tradeHistory||[]).slice(-20).reverse();
        const wins    = (account.tradeHistory||[]).filter(t=>t.pnl>0).length;
        const total   = (account.tradeHistory||[]).length;
        const pnl     = (account.tradeHistory||[]).reduce((s,t)=>s+t.pnl, 0);

        document.getElementById('ai-equity').innerHTML  = `<span class="${cc(ret)}">${fmt(equity)}</span>`;
        document.getElementById('ai-sub').textContent   = `初始 ${fmt(account.initialBalance)}`;
        document.getElementById('ai-return').innerHTML  = `<span class="${cc(ret)}">${fmtP(ret)}</span>`;
        document.getElementById('ai-pnl').innerHTML     = `<span class="${cc(pnl)}">${fmtS(pnl)}</span>`;
        document.getElementById('ai-trades').textContent = `${total} 笔`;
        document.getElementById('ai-winrate').innerHTML = `<span class="up">${total>0?(wins/total*100).toFixed(1):0}%</span>`;

        // 持仓
        const posEl = document.getElementById('ai-positions');
        posEl.innerHTML = positions.length === 0 ? '<div class="empty">当前空仓</div>' :
          positions.map(p => {
            const pct = Math.min(Math.abs(p.percentage), 100);
            const bc  = p.unrealizedPnl >= 0 ? '#3fb950' : '#f85149';
            return `<div class="pos-wrap">
              <div class="pos-top">
                <span class="pos-side ${p.side==='long'?'side-long':'side-short'}">${p.side==='long'?'做多 LONG':'做空 SHORT'}</span>
                <span class="${cc(p.unrealizedPnl)}" style="font-size:18px;font-weight:700">${fmtS(p.unrealizedPnl)} <small>(${fmtP(p.percentage)})</small></span>
              </div>
              <div class="pos-grid">
                <div><label>数量</label><span>${p.contracts.toFixed(4)} BTC</span></div>
                <div><label>开仓价</label><span>${fmt(p.entryPrice)}</span></div>
                <div><label>当前价</label><span>${btcPrice?fmt(btcPrice):'-'}</span></div>
                <div><label>爆仓价</label><span style="color:#f0b429">${fmt(p.liquidationPrice)}</span></div>
              </div>
              <div class="pnl-bar"><div class="pnl-fill" style="width:${pct}%;background:${bc}"></div></div>
            </div>`;
          }).join('');

        // 历史交易
        const histEl = document.getElementById('ai-history');
        histEl.innerHTML = history.length === 0 ? '<div class="empty">暂无交易记录</div>' :
          `<table><thead><tr><th>时间</th><th>方向</th><th>开仓价</th><th>平仓价</th><th>数量</th><th>盈亏</th><th>收益率</th></tr></thead><tbody>` +
          history.map(t => {
            const isClose = t.side?.startsWith('close');
            const isLong  = t.side==='buy'||t.side==='long'||t.side==='close-long';
            const badge   = isClose ? 'b-close' : isLong ? 'b-buy' : 'b-sell';
            const label   = isClose ? (t.side.includes('long')?'平多':'平空') : (isLong?'开多':'开空');
            return `<tr><td>${ts(t.openedAt||t.closedAt)}</td><td><span class="badge ${badge}">${label}</span></td>
              <td>${t.entryPrice?fmt(t.entryPrice):'-'}</td><td>${t.closePrice?fmt(t.closePrice):'-'}</td>
              <td>${(t.contracts||0).toFixed(4)} BTC</td>
              <td class="${cc(t.pnl)}">${fmtS(t.pnl)}</td><td class="${cc(t.pnlPercent)}">${fmtP(t.pnlPercent)}</td></tr>`;
          }).join('') + `</tbody></table>`;

        // Claude决策
        const decList = (decisions||[]).slice(-10).reverse();
        const decEl = document.getElementById('ai-decisions');
        const bMap  = {buy:'b-buy',sell:'b-sell',close:'b-close',hold:'b-hold'};
        const lMap  = {buy:'开多',sell:'开空',close:'平仓',hold:'观望'};
        decEl.innerHTML = decList.length === 0 ? '<div class="empty">今日暂无决策</div>' :
          `<table><thead><tr><th>时间</th><th>决策</th><th>信心</th><th>价格</th><th>RSI</th><th>理由</th></tr></thead><tbody>` +
          decList.map(d => {
            const a = d.decision?.action||'hold'; const c = d.decision?.confidence||0;
            return `<tr><td>${ts(d.timestamp)}</td><td><span class="badge ${bMap[a]||'b-hold'}">${lMap[a]||a}</span></td>
              <td>${c}/10 <span class="conf-bar"><span class="conf-fill" style="width:${c*10}%"></span></span></td>
              <td>${d.price?fmt(d.price):'-'}</td><td>${d.rsi||'-'}</td>
              <td style="color:#8b949e;max-width:240px">${d.decision?.reasoning||''}</td></tr>`;
          }).join('') + `</tbody></table>`;
      }

      // ── 轮换策略 ──
      if (rotAccount?.initialized) {
        // 获取多币价格
        const multiRes = await get('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","ETHUSDT","BNBUSDT","SOLUSDT"]');
        const prices = {};
        if (multiRes) multiRes.forEach(item => { prices[item.symbol.replace('USDT','')] = parseFloat(item.price); });

        const curCoin  = rotAccount.currentCoin;
        const curPrice = prices[curCoin] || 0;
        const rotVal   = rotAccount.coinAmount * curPrice;
        const rotRet   = (rotVal - rotAccount.initialUSDT) / rotAccount.initialUSDT * 100;
        const rotHist  = (rotAccount.tradeHistory||[]).slice(-20).reverse();

        document.getElementById('rot-equity').innerHTML = `<span class="${cc(rotRet)}">${fmt(rotVal)}</span>`;
        document.getElementById('rot-sub').textContent  = `初始 ${fmt(rotAccount.initialUSDT)}`;
        document.getElementById('rot-return').innerHTML = `<span class="${cc(rotRet)}">${fmtP(rotRet)}</span>`;
        document.getElementById('rot-coin').innerHTML   = `<span class="coin-${curCoin}">${rotAccount.coinAmount.toFixed(4)} ${curCoin}</span>`;
        document.getElementById('rot-trades').textContent = `${rotAccount.tradeHistory?.length||0} 次`;

        const rotEl = document.getElementById('rot-history');
        rotEl.innerHTML = rotHist.length === 0 ? '<div class="empty">暂无换币记录</div>' :
          `<table><thead><tr><th>时间</th><th>操作</th><th>卖出价</th><th>买入价</th><th>价值</th></tr></thead><tbody>` +
          rotHist.map(t => `<tr>
            <td>${ts(t.timestamp)}</td>
            <td><span class="coin-${t.fromCoin}">${t.fromCoin}</span> → <span class="coin-${t.toCoin}">${t.toCoin}</span></td>
            <td>${fmt(t.fromPrice)}</td><td>${fmt(t.toPrice)}</td>
            <td>${fmt(t.usdtValue)}</td>
          </tr>`).join('') + `</tbody></table>`;
      } else {
        document.getElementById('rot-equity').textContent = '初始化中...';
        document.getElementById('rot-sub').textContent    = '等待第一次运行';
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
