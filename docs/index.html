<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BTC 模拟交易仪表盘</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }
    .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header h1 span { color: #f0b429; }
    .price-badge { background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 6px 16px; font-size: 20px; font-weight: 700; color: #58a6ff; }
    .refresh-note { color: #8b949e; font-size: 12px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
    .card-label { color: #8b949e; font-size: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .card-value { font-size: 28px; font-weight: 700; }
    .card-sub { font-size: 12px; color: #8b949e; margin-top: 4px; }
    .up { color: #3fb950; } .down { color: #f85149; } .neutral { color: #e6edf3; }
    .section { background: #161b22; border: 1px solid #30363d; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
    .section-title { padding: 14px 20px; border-bottom: 1px solid #30363d; font-weight: 600; font-size: 13px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }
    .empty { padding: 32px; text-align: center; color: #8b949e; }
    .position-card { padding: 20px; }
    .position-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    .position-side { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 13px; letter-spacing: 1px; }
    .side-long { background: rgba(63,185,80,0.15); color: #3fb950; border: 1px solid #3fb950; }
    .side-short { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid #f85149; }
    .position-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
    .pos-item label { display: block; color: #8b949e; font-size: 11px; margin-bottom: 4px; }
    .pos-item span { font-size: 16px; font-weight: 600; }
    .pnl-bar { margin-top: 16px; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; }
    .pnl-bar-fill { height: 100%; border-radius: 2px; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px 16px; text-align: left; color: #8b949e; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #21262d; font-weight: 500; }
    td { padding: 10px 16px; border-bottom: 1px solid #21262d; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1c2128; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-buy { background: rgba(63,185,80,0.15); color: #3fb950; }
    .badge-sell { background: rgba(248,81,73,0.15); color: #f85149; }
    .badge-close { background: rgba(240,180,41,0.15); color: #f0b429; }
    .badge-hold { background: rgba(139,148,158,0.15); color: #8b949e; }
    .conf-bar { display: inline-block; width: 60px; height: 6px; background: #21262d; border-radius: 3px; vertical-align: middle; margin-left: 6px; overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 3px; background: #58a6ff; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3fb950; animation: pulse 2s infinite; margin-right: 6px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .setup-banner { background: #1c2128; border: 1px solid #f0b429; border-radius: 12px; padding: 24px; margin-bottom: 24px; display: none; }
    .setup-banner h2 { color: #f0b429; margin-bottom: 8px; }
    .setup-banner p { color: #8b949e; line-height: 1.6; }
    .setup-banner code { background: #0d1117; padding: 2px 6px; border-radius: 4px; color: #58a6ff; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 BTC <span>模拟合约</span> 仪表盘</h1>
    <div class="price-badge" id="btc-price">获取中...</div>
    <div class="refresh-note"><span class="dot"></span>每30秒刷新</div>
  </div>

  <div class="container">
    <div class="setup-banner" id="setup-banner">
      <h2>⚙️ 需要配置 GitHub 用户名</h2>
      <p>请打开 <code>docs/index.html</code>，将顶部的 <code>GITHUB_USER</code> 和 <code>GITHUB_REPO</code> 替换为你的实际值。</p>
    </div>

    <div class="cards">
      <div class="card"><div class="card-label">总资产</div><div class="card-value" id="equity">--</div><div class="card-sub" id="initial">--</div></div>
      <div class="card"><div class="card-label">累计收益率</div><div class="card-value" id="total-return">--</div><div class="card-sub" id="total-pnl">--</div></div>
      <div class="card"><div class="card-label">可用保证金</div><div class="card-value" id="available">--</div><div class="card-sub" id="used-margin">--</div></div>
      <div class="card"><div class="card-label">胜率</div><div class="card-value" id="win-rate">--</div><div class="card-sub" id="trade-count">--</div></div>
    </div>

    <div class="section"><div class="section-title">当前持仓</div><div id="positions-content"><div class="empty">加载中...</div></div></div>
    <div class="section"><div class="section-title">历史交易（最近20笔）</div><div id="history-content"><div class="empty">加载中...</div></div></div>
    <div class="section"><div class="section-title">Claude 今日决策记录</div><div id="decisions-content"><div class="empty">加载中...</div></div></div>
  </div>

  <script>
    // ====== 在这里填写你的 GitHub 信息 ======
    const GITHUB_USER = 'Kyo-G';
    const GITHUB_REPO = 'crypto-trading-bot';
    // ==========================================

    const BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;

    const fmt = (n, dec=2) => '$' + Math.abs(parseFloat(n)).toFixed(dec).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    const fmtSigned = (n) => (parseFloat(n) >= 0 ? '+$' : '-$') + Math.abs(parseFloat(n)).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    const fmtPct = (n) => (parseFloat(n) >= 0 ? '+' : '') + parseFloat(n).toFixed(2) + '%';
    const colorClass = (n) => parseFloat(n) > 0 ? 'up' : parseFloat(n) < 0 ? 'down' : 'neutral';
    const timeStr = (iso) => {
      if (!iso) return '-';
      return new Date(iso).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false, month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    };

    async function fetchJSON(url) {
      try {
        const res = await fetch(url + '?t=' + Date.now());
        if (!res.ok) return null;
        return await res.json();
      } catch { return null; }
    }

    async function fetchBTCPrice() {
      try {
        const res = await fetch('https://fapi.binance.com/fapi/v1/ticker/price?symbol=BTCUSDT');
        const d = await res.json();
        return parseFloat(d.price);
      } catch { return null; }
    }

    async function refresh() {
      if (GITHUB_USER === 'YOUR_GITHUB_USERNAME') {
        document.getElementById('setup-banner').style.display = '';
        return;
      }

      const today = new Date().toISOString().split('T')[0];
      const [account, decisions, currentPrice] = await Promise.all([
        fetchJSON(`${BASE}/data/paper-account.json`),
        fetchJSON(`${BASE}/logs/decisions-${today}.json`),
        fetchBTCPrice(),
      ]);

      // BTC价格
      if (currentPrice) {
        document.getElementById('btc-price').textContent = '$' + currentPrice.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      }

      if (!account) {
        document.getElementById('equity').textContent = '等待数据...';
        return;
      }

      // 计算持仓实时盈亏
      const positions = (account.positions || []).map(p => {
        const price = currentPrice || p.entryPrice;
        const pnl = p.side === 'long' ? (price - p.entryPrice) * p.contracts : (p.entryPrice - price) * p.contracts;
        return { ...p, unrealizedPnl: pnl, percentage: (pnl / p.margin) * 100 };
      });

      const unrealized = positions.reduce((s, p) => s + p.unrealizedPnl, 0);
      const equity = account.balance.USDT + account.balance.used + unrealized;
      const totalReturn = ((equity - account.initialBalance) / account.initialBalance * 100);
      const history = (account.tradeHistory || []).slice(-20).reverse();
      const wins = (account.tradeHistory || []).filter(t => t.pnl > 0).length;
      const totalPnl = (account.tradeHistory || []).reduce((s, t) => s + t.pnl, 0);
      const totalTrades = (account.tradeHistory || []).length;

      // 概览卡片
      document.getElementById('equity').innerHTML = `<span class="${colorClass(equity - account.initialBalance)}">${fmt(equity)}</span>`;
      document.getElementById('initial').textContent = '初始 ' + fmt(account.initialBalance);
      document.getElementById('total-return').innerHTML = `<span class="${colorClass(totalReturn)}">${fmtPct(totalReturn)}</span>`;
      document.getElementById('total-pnl').innerHTML = `累计盈亏 <span class="${colorClass(totalPnl)}">${fmtSigned(totalPnl)}</span>`;
      document.getElementById('available').textContent = fmt(account.balance.USDT);
      document.getElementById('used-margin').textContent = '占用 ' + fmt(account.balance.used);
      document.getElementById('win-rate').innerHTML = `<span class="up">${totalTrades > 0 ? (wins/totalTrades*100).toFixed(1) : '0.0'}%</span>`;
      document.getElementById('trade-count').textContent = `共 ${totalTrades} 笔  胜${wins} 负${totalTrades - wins}`;

      // 持仓
      const posEl = document.getElementById('positions-content');
      if (positions.length === 0) {
        posEl.innerHTML = '<div class="empty">当前空仓</div>';
      } else {
        posEl.innerHTML = positions.map(p => {
          const pct = Math.min(Math.abs(p.percentage), 100);
          const barColor = p.unrealizedPnl >= 0 ? '#3fb950' : '#f85149';
          return `
            <div class="position-card">
              <div class="position-top">
                <span class="position-side ${p.side === 'long' ? 'side-long' : 'side-short'}">${p.side === 'long' ? '做多 LONG' : '做空 SHORT'}</span>
                <span class="${colorClass(p.unrealizedPnl)}" style="font-size:20px;font-weight:700">
                  ${fmtSigned(p.unrealizedPnl)} <span style="font-size:14px">(${fmtPct(p.percentage)})</span>
                </span>
              </div>
              <div class="position-grid">
                <div class="pos-item"><label>数量</label><span>${p.contracts.toFixed(4)} BTC</span></div>
                <div class="pos-item"><label>开仓价</label><span>${fmt(p.entryPrice)}</span></div>
                <div class="pos-item"><label>当前价</label><span>${currentPrice ? fmt(currentPrice) : '-'}</span></div>
                <div class="pos-item"><label>爆仓价</label><span style="color:#f0b429">${fmt(p.liquidationPrice)}</span></div>
                <div class="pos-item"><label>保证金</label><span>${fmt(p.margin)}</span></div>
                <div class="pos-item"><label>杠杆</label><span>${p.leverage}x</span></div>
              </div>
              <div class="pnl-bar"><div class="pnl-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
            </div>`;
        }).join('');
      }

      // 历史交易
      const histEl = document.getElementById('history-content');
      if (history.length === 0) {
        histEl.innerHTML = '<div class="empty">暂无交易记录</div>';
      } else {
        histEl.innerHTML = '<table><thead><tr><th>时间</th><th>方向</th><th>开仓价</th><th>平仓价</th><th>数量</th><th>盈亏</th><th>收益率</th></tr></thead><tbody>' +
          history.map(t => {
            const isClose = t.side?.startsWith('close');
            const isLong = t.side === 'buy' || t.side === 'long' || t.side === 'close-long';
            const badge = isClose ? 'badge-close' : isLong ? 'badge-buy' : 'badge-sell';
            const label = isClose ? (t.side.includes('long') ? '平多' : '平空') : (isLong ? '开多' : '开空');
            return `<tr>
              <td>${timeStr(t.openedAt || t.closedAt)}</td>
              <td><span class="badge ${badge}">${label}</span></td>
              <td>${t.entryPrice ? fmt(t.entryPrice) : '-'}</td>
              <td>${t.closePrice ? fmt(t.closePrice) : '-'}</td>
              <td>${(t.contracts||0).toFixed(4)} BTC</td>
              <td class="${colorClass(t.pnl)}">${fmtSigned(t.pnl)}</td>
              <td class="${colorClass(t.pnlPercent)}">${fmtPct(t.pnlPercent)}</td>
            </tr>`;
          }).join('') + '</tbody></table>';
      }

      // Claude决策
      const decEl = document.getElementById('decisions-content');
      const decList = (decisions || []).slice(-10).reverse();
      if (decList.length === 0) {
        decEl.innerHTML = '<div class="empty">今日暂无决策记录</div>';
      } else {
        const badges = { buy:'badge-buy', sell:'badge-sell', close:'badge-close', hold:'badge-hold' };
        const labels = { buy:'开多', sell:'开空', close:'平仓', hold:'观望' };
        decEl.innerHTML = '<table><thead><tr><th>时间</th><th>决策</th><th>信心</th><th>BTC价格</th><th>RSI</th><th>理由</th></tr></thead><tbody>' +
          decList.map(dec => {
            const action = dec.decision?.action || 'hold';
            const conf = dec.decision?.confidence || 0;
            return `<tr>
              <td>${timeStr(dec.timestamp)}</td>
              <td><span class="badge ${badges[action]||'badge-hold'}">${labels[action]||action}</span></td>
              <td>${conf}/10 <span class="conf-bar"><span class="conf-fill" style="width:${conf*10}%"></span></span></td>
              <td>${dec.price ? fmt(dec.price) : '-'}</td>
              <td>${dec.rsi || '-'}</td>
              <td style="color:#8b949e;max-width:260px">${dec.decision?.reasoning || ''}</td>
            </tr>`;
          }).join('') + '</tbody></table>';
      }
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
